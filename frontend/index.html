<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedBand - Case Intake</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #00c896;
      --accent-dim: #00a67d;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.35rem;
      margin-top: 1rem;
    }
    label:first-of-type { margin-top: 0; }
    input, select, textarea {
      width: 100%;
      padding: 0.65rem 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    textarea { min-height: 90px; resize: vertical; }
    button {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.85rem;
      background: var(--accent);
      color: #0f1419;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-dim); }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
      display: none;
    }
    #result.visible { display: block; }
    #result.error { border-color: var(--danger); }
    #result h3 {
      font-size: 1rem;
      margin-bottom: 0.75rem;
      color: var(--accent);
    }
    #result .row {
      display: flex;
      justify-content: space-between;
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--border);
    }
    #result .row:last-child { border-bottom: none; }
    #result .label { color: var(--muted); font-size: 0.8rem; }
    #result .value { font-weight: 500; text-align: right; max-width: 60%; }
    #result .status-ready { color: var(--accent); }
    #result .status-escalated { color: var(--danger); }
    #result .note {
      margin-top: 0.75rem;
      padding: 0.75rem;
      background: var(--surface);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .badge {
      display: inline-block;
      background: var(--accent);
      color: #0f1419;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      margin-left: 0.5rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MedBand <span class="badge">Phase 1</span></h1>
    <p class="subtitle">The Billionaire Republic - Healthcare Workflow Intake</p>

    <form id="caseForm">
      <label for="sector">Healthcare Sector</label>
      <select id="sector" name="sector" required>
        <option value="pharmacy">Pharmacy</option>
        <option value="hospital_triage">Hospital Triage</option>
        <option value="lab">Lab / Diagnostics</option>
        <option value="mental_health">Mental Health</option>
        <option value="hmo_claims">HMO / Insurance Claims</option>
        <option value="emergency">Emergency Dispatch</option>
      </select>

      <label for="name">Patient / Caller Name</label>
      <input type="text" id="name" name="name" placeholder="e.g. Ada Okonkwo" required>

      <label for="issue">Issue / Complaint</label>
      <textarea id="issue" name="issue" placeholder="Describe symptoms, concern, or emergency..." required></textarea>

      <label for="service">Requested Service</label>
      <input type="text" id="service" name="service" placeholder="Drug name, test, procedure code, etc." required>

      <label for="urgency">Urgency</label>
      <select id="urgency" name="urgency" required>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
        <option value="critical">Critical</option>
      </select>

      <button type="submit" id="submitBtn">Submit Case</button>
    </form>

    <div id="result"></div>
  </div>

  <script>
    const form = document.getElementById('caseForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function labelize(key) {
      return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function renderSummary(data) {
      if (data.error) {
        return '<h3>Submission Failed</h3><p>' + data.error + '</p>';
      }

      const intake = data.intake || {};
      const verification = data.verification || {};
      const resource = data.resource || {};
      const statusClass = data.status === 'ESCALATED' ? 'status-escalated' : 'status-ready';

      let html = '<h3>Case Submitted</h3>';
      html += row('Case ID', data.case_id);
      html += row('Status', data.status.replace(/_/g, ' '), statusClass);
      html += row('Approver', data.human_role);
      html += row('Patient', intake.requester_name || intake.caller_name);
      html += row('Service', intake.requested_service);
      html += row('Issue', intake.presenting_issue || intake.chief_complaint || intake.presenting_concern);

      if (verification.reason) {
        html += '<div class="note"><strong>Verification:</strong> ' + verification.reason + '</div>';
      }
      if (resource.in_stock !== undefined) {
        html += row('In Stock', resource.in_stock ? 'Yes (' + resource.quantity_available + ' units)' : 'No');
      }
      if (resource.unit_price_ngn) {
        html += row('Price', '₦' + resource.unit_price_ngn);
      }

      const auditCount = (data.audit_trail || []).length;
      html += '<div class="note">Workflow complete. ' + auditCount + ' audit entries recorded. Open the Streamlit dashboard to review and approve.</div>';
      return html;
    }

    function row(label, value, extraClass) {
      if (!value) return '';
      return '<div class="row"><span class="label">' + label + '</span><span class="value ' + (extraClass || '') + '">' + value + '</span></div>';
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Processing...';
      result.classList.remove('error', 'visible');
      result.innerHTML = '';

      const formData = new FormData(form);

      try {
        const response = await fetch('/submit', {
          method: 'POST',
          body: formData
        });
        const data = await response.json();
        result.innerHTML = renderSummary(data);
        result.classList.add('visible');
        if (!response.ok) result.classList.add('error');
      } catch (err) {
        result.innerHTML = '<h3>Error</h3><p>' + err.message + '</p>';
        result.classList.add('visible', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Case';
      }
    });
  </script>
</body>
</html>
